<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CLICK THE SPACE</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: crosshair;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    h1 {
      position: fixed;
      top: 40%;
      width: 100%;
      text-align: center;
      font-size: 64px;
      color: #ffffff;
      text-shadow:
        0 0 15px #00ffff,
        0 0 40px #00ffff,
        0 0 80px #00ffff;
      animation: glow 2s infinite alternate;
      pointer-events: none;
      user-select: none;
      z-index: 2;
    }

    @keyframes glow {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
    }
  </style>
</head>

<body>

<h1>CLICK THE SPACE</h1>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// ⭐ ЗВЁЗДЫ
const stars = Array.from({ length: 300 }, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.5,
  speed: Math.random() * 0.6 + 0.2
}));

// 🎆 ЧАСТИЦЫ
let particles = [];

canvas.addEventListener("click", e => {
  const color = `hsl(${Math.random() * 360}, 100%, 60%)`;

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: e.clientX,
      y: e.clientY,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12,
      life: 100,
      color: color
    });
  }
});

function animate() {
  // 🌑 фон
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ⭐ звёзды
  ctx.fillStyle = "white";
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) s.y = 0;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // 🎆 фейерверки
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 100;
    ctx.fillRect(p.x, p.y, 4, 4);
    ctx.globalAlpha = 1;

    if (p.life <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
